<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meross Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css"
    integrity="sha256-/fJonUuxkkw6K/ReqJCfynXXQVosFIMt2wuR7WFaNtE="
    crossorigin="anonymous">
  <link rel="stylesheet" href="/static/theme.css">
  <script src="/static/theme.js"></script>
  <!-- Tailwind CDN: SRI not possible with runtime CSS generation -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="min-h-screen flex items-center justify-center bg-base-300 relative">
  <!-- Theme toggle -->
  <button id="theme-toggle-btn" class="btn btn-ghost btn-circle fixed top-4 right-4"><i class="theme-icon fas fa-moon text-lg"></i></button>
  <div class="card w-full max-w-sm bg-base-200 shadow-xl">
    <div class="card-body">
      <!-- Heading -->
      <div class="text-center mb-4">
        <i class="fas fa-door-open text-4xl text-primary mb-3"></i>
        <h1 class="text-2xl font-bold">Meross MQTT Bridge</h1>
      </div>

      <!-- Error messages -->
      {% if error %}
        <div class="alert alert-error shadow-sm mb-2">
          <i class="fas fa-circle-exclamation"></i>
          <span>{{ error }}</span>
        </div>
      {% endif %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-info shadow-sm mb-2" role="alert">
            <i class="fas fa-circle-exclamation"></i>
            <span>{{ msg }}</span>
          </div>
        {% endfor %}
      {% endif %}

      <!-- Login form -->
      <form method="POST" action="/login">
        <div class="form-control mb-3">
          <label class="label" for="username-input">
            <span class="label-text">Username</span>
          </label>
          <input type="text" name="username" id="username-input" autocomplete="username" placeholder="Username" class="input input-bordered w-full" required autofocus>
        </div>

        <div class="form-control mb-5">
          <label class="label" for="password-input">
            <span class="label-text">Password</span>
          </label>
          <input type="password" name="password" id="password-input" autocomplete="current-password" placeholder="Password" class="input input-bordered w-full" required>
        </div>

        <button type="submit" class="btn btn-primary w-full">
          <i class="fas fa-right-to-bracket mr-1"></i>
          Login
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('theme-toggle-btn')
      .addEventListener('click', function() { MerossTheme.toggle(); });
  </script>
</body>
</html>
