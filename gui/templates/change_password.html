<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Meross Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css">
  <link rel="stylesheet" href="/static/theme.css">
  <script src="/static/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="min-h-screen flex items-center justify-center bg-base-300 relative">
  <!-- Theme toggle -->
  <button id="theme-toggle-btn" class="btn btn-ghost btn-circle fixed top-4 right-4"><i class="theme-icon fas fa-moon text-lg"></i></button>
  <div class="card w-full max-w-sm bg-base-200 shadow-xl">
    <div class="card-body">
      <!-- Heading -->
      <div class="text-center mb-2">
        <i class="fas fa-key text-4xl text-warning mb-3"></i>
        <h1 class="text-2xl font-bold">Change Password</h1>
        <p class="text-sm text-base-content/60 mt-1">You must change your password before continuing</p>
      </div>

      <!-- Error messages -->
      {% if error %}
        <div class="alert alert-error shadow-sm mb-2">
          <i class="fas fa-circle-exclamation"></i>
          <span>{{ error }}</span>
        </div>
      {% endif %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-error shadow-sm mb-2">
            <i class="fas fa-circle-exclamation"></i>
            <span>{{ msg.text if msg.text else msg }}</span>
          </div>
        {% endfor %}
      {% endif %}

      <!-- Client-side error -->
      <div id="client-error" class="alert alert-error shadow-sm mb-2 hidden">
        <i class="fas fa-circle-exclamation"></i>
        <span id="client-error-text"></span>
      </div>

      <!-- Change password form -->
      <form method="POST" action="/change-password" id="change-pw-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-control mb-3">
          <label class="label" for="current_password">
            <span class="label-text">Current Password</span>
          </label>
          <input type="password" name="current_password" id="current_password" autocomplete="current-password" placeholder="Current password" class="input input-bordered w-full" required autofocus>
        </div>

        <div class="form-control mb-3">
          <label class="label" for="new_password">
            <span class="label-text">New Password</span>
          </label>
          <input type="password" name="new_password" id="new_password" autocomplete="new-password" placeholder="New password" class="input input-bordered w-full" required>
        </div>

        <div class="form-control mb-5">
          <label class="label" for="confirm_password">
            <span class="label-text">Confirm Password</span>
          </label>
          <input type="password" name="confirm_password" id="confirm_password" autocomplete="new-password" placeholder="Confirm password" class="input input-bordered w-full" required>
        </div>

        <button type="submit" class="btn btn-primary w-full">
          <i class="fas fa-check mr-1"></i>
          Update Password
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('change-pw-form').addEventListener('submit', function(e) {
      const newPw = document.getElementById('new_password').value;
      const confirmPw = document.getElementById('confirm_password').value;
      const errorDiv = document.getElementById('client-error');
      const errorText = document.getElementById('client-error-text');

      errorDiv.classList.add('hidden');

      if (newPw !== confirmPw) {
        e.preventDefault();
        errorText.textContent = 'Passwords do not match.';
        errorDiv.classList.remove('hidden');
        return;
      }

      if (newPw.length < 8) {
        e.preventDefault();
        errorText.textContent = 'Password must be at least 8 characters.';
        errorDiv.classList.remove('hidden');
        return;
      }
    });
  </script>

  <script>
    document.getElementById('theme-toggle-btn')
      .addEventListener('click', function() { MerossTheme.toggle(); });
  </script>
</body>
</html>
