<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Meross Bridge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css">
  <style>
    :root {
      --color-primary: oklch(60% 0.185 150);
      --color-primary-content: oklch(98% 0.02 150);
      --icon-color: rgba(0,0,0,0.6);
    }
    [data-theme="dim"] {
      --color-base-100: oklch(27.0% 0.025 252);
      --color-base-200: oklch(18.0% 0.020 252);
      --color-base-300: oklch(14.0% 0.025 252);
      --color-base-content: oklch(97.3% 0.004 247);
      --color-primary: oklch(60% 0.185 150);
      --color-primary-content: oklch(98% 0.02 150);
      --icon-color: rgba(255,255,255,0.75);
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script>
    (function() {
      const saved = localStorage.getItem('meross-theme');
      const theme = saved === 'dark' ? 'dim' : (saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dim' : 'light'));
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-300 relative">
  <!-- Theme toggle -->
  <button onclick="(function(){var t=document.documentElement.getAttribute('data-theme')==='dim'?'light':'dim';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('meross-theme',t);document.getElementById('theme-icon-standalone').className=t==='dim'?'fas fa-moon':'fas fa-sun';})()" style="position:fixed;top:1rem;right:1rem;" class="btn btn-ghost btn-circle"><i class="fas fa-moon" id="theme-icon-standalone"></i></button>
  <div class="card w-full max-w-sm bg-base-200 shadow-xl">
    <div class="card-body">
      <!-- Heading -->
      <div class="text-center mb-2">
        <i class="fas fa-key text-4xl text-warning mb-3"></i>
        <h1 class="text-2xl font-bold">Change Password</h1>
        <p class="text-sm text-base-content/60 mt-1">You must change your password before continuing</p>
      </div>

      <!-- Error messages -->
      {% if error %}
        <div class="alert alert-error shadow-sm mb-2">
          <i class="fas fa-circle-exclamation"></i>
          <span>{{ error }}</span>
        </div>
      {% endif %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-error shadow-sm mb-2">
            <i class="fas fa-circle-exclamation"></i>
            <span>{{ msg.text if msg.text else msg }}</span>
          </div>
        {% endfor %}
      {% endif %}

      <!-- Client-side error -->
      <div id="client-error" class="alert alert-error shadow-sm mb-2 hidden">
        <i class="fas fa-circle-exclamation"></i>
        <span id="client-error-text"></span>
      </div>

      <!-- Change password form -->
      <form method="POST" action="/change-password" id="change-pw-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-control mb-3">
          <label class="label">
            <span class="label-text">Current Password</span>
          </label>
          <input type="password" name="current_password" id="current_password" placeholder="Current password" class="input input-bordered w-full" required autofocus>
        </div>

        <div class="form-control mb-3">
          <label class="label">
            <span class="label-text">New Password</span>
          </label>
          <input type="password" name="new_password" id="new_password" placeholder="New password" class="input input-bordered w-full" required>
        </div>

        <div class="form-control mb-5">
          <label class="label">
            <span class="label-text">Confirm Password</span>
          </label>
          <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm password" class="input input-bordered w-full" required>
        </div>

        <button type="submit" class="btn btn-primary w-full">
          <i class="fas fa-check mr-1"></i>
          Update Password
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('change-pw-form').addEventListener('submit', function(e) {
      const newPw = document.getElementById('new_password').value;
      const confirmPw = document.getElementById('confirm_password').value;
      const errorDiv = document.getElementById('client-error');
      const errorText = document.getElementById('client-error-text');

      errorDiv.classList.add('hidden');

      if (newPw !== confirmPw) {
        e.preventDefault();
        errorText.textContent = 'Passwords do not match.';
        errorDiv.classList.remove('hidden');
        return;
      }

      if (newPw.length < 8) {
        e.preventDefault();
        errorText.textContent = 'Password must be at least 8 characters.';
        errorDiv.classList.remove('hidden');
        return;
      }
    });
  </script>

  <script>
    var t = document.documentElement.getAttribute('data-theme');
    document.getElementById('theme-icon-standalone').className = t === 'dim' ? 'fas fa-moon' : 'fas fa-sun';
  </script>
</body>
</html>
