<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meross Bridge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css">
  <style>
    :root {
      --color-primary: oklch(60% 0.185 150);
      --color-primary-content: oklch(98% 0.02 150);
      --icon-color: rgba(0,0,0,0.6);
    }
    [data-theme="dim"] {
      --color-base-100: oklch(27.0% 0.025 252);
      --color-base-200: oklch(18.0% 0.020 252);
      --color-base-300: oklch(14.0% 0.025 252);
      --color-base-content: oklch(97.3% 0.004 247);
      --color-primary: oklch(60% 0.185 150);
      --color-primary-content: oklch(98% 0.02 150);
      --icon-color: rgba(255,255,255,0.75);
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script>
    (function() {
      const saved = localStorage.getItem('meross-theme');
      const theme = saved === 'dark' ? 'dim' : (saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dim' : 'light'));
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-300 relative">
  <!-- Theme toggle -->
  <button onclick="(function(){var t=document.documentElement.getAttribute('data-theme')==='dim'?'light':'dim';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('meross-theme',t);document.getElementById('theme-icon-standalone').className=t==='dim'?'fas fa-moon':'fas fa-sun';})()" style="position:fixed;top:1rem;right:1rem;" class="btn btn-ghost btn-circle"><i class="fas fa-moon" id="theme-icon-standalone"></i></button>
  <div class="card w-full max-w-sm bg-base-200 shadow-xl">
    <div class="card-body">
      <!-- Heading -->
      <div class="text-center mb-4">
        <i class="fas fa-door-open text-4xl text-primary mb-3"></i>
        <h1 class="text-2xl font-bold">Meross MQTT Bridge</h1>
      </div>

      <!-- Error messages -->
      {% if error %}
        <div class="alert alert-error shadow-sm mb-2">
          <i class="fas fa-circle-exclamation"></i>
          <span>{{ error }}</span>
        </div>
      {% endif %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-error shadow-sm mb-2">
            <i class="fas fa-circle-exclamation"></i>
            <span>{{ msg }}</span>
          </div>
        {% endfor %}
      {% endif %}

      <!-- Login form -->
      <form method="POST" action="/login">
        <div class="form-control mb-3">
          <label class="label">
            <span class="label-text">Username</span>
          </label>
          <input type="text" name="username" placeholder="Username" class="input input-bordered w-full" required autofocus>
        </div>

        <div class="form-control mb-5">
          <label class="label">
            <span class="label-text">Password</span>
          </label>
          <input type="password" name="password" placeholder="Password" class="input input-bordered w-full" required>
        </div>

        <button type="submit" class="btn btn-primary w-full">
          <i class="fas fa-right-to-bracket mr-1"></i>
          Login
        </button>
      </form>
    </div>
  </div>

  <script>
    var t = document.documentElement.getAttribute('data-theme');
    document.getElementById('theme-icon-standalone').className = t === 'dim' ? 'fas fa-moon' : 'fas fa-sun';
  </script>
</body>
</html>
