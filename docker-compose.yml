version: "3.8"

services:
  bridge:
    build: ./bridge
    container_name: meross-bridge
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gui:
    build: ./gui
    container_name: meross-gui
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - bridge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
