{% extends "base.html" %}
{% block title %}Logs - Meross Bridge{% endblock %}
{% block title_bar %}Logs{% endblock %}

{% block content %}
<!-- Controls bar -->
<div class="flex items-center justify-between mb-3">
  <div class="flex items-center gap-2">
    <span class="text-sm text-base-content/60" id="line-count">0 lines</span>
  </div>
  <div class="flex items-center gap-2">
    <button id="pause-btn" class="btn btn-sm btn-ghost">
      <i class="fas fa-pause mr-1" id="pause-icon"></i>
      <span id="pause-text">Pause</span>
    </button>
    <button id="clear-btn" class="btn btn-sm btn-ghost">
      <i class="fas fa-trash-can mr-1"></i>
      Clear
    </button>
  </div>
</div>

<!-- Terminal console -->
<div class="rounded-lg overflow-hidden shadow-lg">
  <!-- Titlebar -->
  <div class="flex items-center px-4 py-2" style="background-color: #2d2d2d;">
    <div class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full inline-block" style="background-color: #ff5f56;"></span>
      <span class="w-3 h-3 rounded-full inline-block" style="background-color: #ffbd2e;"></span>
      <span class="w-3 h-3 rounded-full inline-block" style="background-color: #27c93f;"></span>
    </div>
    <span class="flex-1 text-center text-sm" style="color: #9ca3af;">meross-bridge — python</span>
    <div class="w-12"></div>
  </div>

  <!-- Console body -->
  <div id="console" class="font-mono text-sm overflow-y-auto p-4" style="background-color: #1a1a1a; color: #4ade80; min-height: 70vh; max-height: 80vh;">
    <div class="text-gray-500">Connecting to log stream...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const consoleEl = document.getElementById('console');
  const lineCountEl = document.getElementById('line-count');
  const pauseBtn = document.getElementById('pause-btn');
  const pauseIcon = document.getElementById('pause-icon');
  const pauseText = document.getElementById('pause-text');
  const clearBtn = document.getElementById('clear-btn');

  let lineCount = 0;
  let autoScroll = true;
  let ws = null;
  let reconnectTimer = null;

  // Timestamp regex: YYYY-MM-DD HH:MM:SS
  const tsRegex = /^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})/;

  function appendLine(text) {
    const div = document.createElement('div');
    div.style.whiteSpace = 'pre-wrap';
    div.style.wordBreak = 'break-all';

    const match = text.match(tsRegex);
    if (match) {
      const tsSpan = document.createElement('span');
      tsSpan.style.color = '#6b7280';
      tsSpan.textContent = match[1];

      const restSpan = document.createElement('span');
      restSpan.textContent = text.slice(match[1].length);

      div.appendChild(tsSpan);
      div.appendChild(restSpan);
    } else {
      div.textContent = text;
    }

    consoleEl.appendChild(div);
    lineCount++;
    lineCountEl.textContent = lineCount + ' line' + (lineCount !== 1 ? 's' : '');

    if (autoScroll) {
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }
  }

  // Detect user scroll
  consoleEl.addEventListener('scroll', function() {
    const atBottom = consoleEl.scrollTop + consoleEl.clientHeight >= consoleEl.scrollHeight - 20;
    if (!atBottom && autoScroll) {
      // User scrolled up -- don't auto-pause, let them use the button
    }
  });

  // Pause/Resume toggle
  pauseBtn.addEventListener('click', function() {
    autoScroll = !autoScroll;
    if (autoScroll) {
      pauseIcon.className = 'fas fa-pause mr-1';
      pauseText.textContent = 'Pause';
      consoleEl.scrollTop = consoleEl.scrollHeight;
    } else {
      pauseIcon.className = 'fas fa-play mr-1';
      pauseText.textContent = 'Resume';
    }
  });

  // Clear console
  clearBtn.addEventListener('click', function() {
    consoleEl.innerHTML = '';
    lineCount = 0;
    lineCountEl.textContent = '0 lines';
  });

  // WebSocket connection
  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + location.host + '/ws/logs');

    ws.onopen = function() {
      // Clear the "Connecting..." message on first connect
      if (consoleEl.children.length === 1 && consoleEl.firstChild.textContent === 'Connecting to log stream...') {
        consoleEl.innerHTML = '';
        lineCount = 0;
      }
      appendLine('--- Connected to log stream ---');
    };

    ws.onmessage = function(event) {
      const lines = event.data.split('\n');
      lines.forEach(function(line) {
        if (line !== '') {
          appendLine(line);
        }
      });
    };

    ws.onclose = function() {
      appendLine('--- Disconnected from log stream ---');
      scheduleReconnect();
    };

    ws.onerror = function() {
      appendLine('--- WebSocket error ---');
      try { ws.close(); } catch(e) {}
      scheduleReconnect();
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    appendLine('--- Reconnecting in 3 seconds... ---');
    reconnectTimer = setTimeout(function() {
      reconnectTimer = null;
      connectWS();
    }, 3000);
  }

  // Start connection
  connectWS();
</script>
{% endblock %}
